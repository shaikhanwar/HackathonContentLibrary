<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Content Library — Self Tests</title>
  <style>
    :root { --line:#e3e3e3; --ink:#1b1b1b; --muted:#6a6a6a; --green:#107c10; --red:#c50f1f; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 28px; color: var(--ink); background: #faf9f8; }
    h1 { font-size: 20px; margin: 0 0 4px; }
    .sub { color: var(--muted); margin: 0 0 20px; font-size: 14px; }
    .summary { font-size: 18px; font-weight: 700; padding: 12px 16px; border-radius: 8px; margin-bottom: 14px; }
    .summary.pass { background: #e6f4ea; color: var(--green); border: 1px solid #a6d8b5; }
    .summary.fail { background: #fde7e9; color: var(--red); border: 1px solid #f0a6ad; }
    .muted { color: var(--muted); font-size: 13.5px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; font-size: 13.5px; margin-top: 10px; }
    th, td { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--line); vertical-align: top; }
    th { background: #f3f2f1; font-size: 12px; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); }
    tr.ok td:nth-child(2) { color: var(--green); font-weight: 600; }
    tr.no td:nth-child(2) { color: var(--red); font-weight: 700; }
    tr.no { background: #fff5f6; }
    a { color: #0a5ad6; }
  </style>
</head>
<body>
  <h1>Hackathon Content Library — End-to-End Self Tests</h1>
  <p class="sub">Runs the real scoring engine and entity factory against a dummy program built from empty. <a href="index.html">← Back to app</a></p>
  <div id="out">Running…</div>
  <script type="module" src="js/selftest.js"></script>
</body>
</html>
